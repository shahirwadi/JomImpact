name: jomimpact
description: JomImpact - Volunteering Event Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.3.3

  # State management
  provider: ^6.1.1

  # UI / utilities
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  http: ^1.2.1
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  flutter_stripe: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - env/dev.json
